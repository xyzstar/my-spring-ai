<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - 智能数据库查询</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .config-panel {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .config-row {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
        }

        .config-row:last-child {
            margin-bottom: 0;
        }

        .config-label {
            font-weight: 600;
            color: #495057;
            min-width: 100px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
        }

        select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-area {
            height: 500px;
            overflow-y: auto;
            padding: 20px 30px;
            background: #ffffff;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }

        .assistant-message {
            background: #f1f3f5;
            color: #212529;
            margin-right: auto;
        }

        .error-message {
            background: #ffe3e3;
            color: #c92a2a;
            margin-right: auto;
        }

        .input-area {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendButton {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .model-hint {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }

        /* 数据库查询样式 */
        .db-query-section {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .db-query-title {
            font-size: 18px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 15px;
        }

        .query-options {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .query-option-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .query-option-label {
            font-weight: 600;
            color: #495057;
        }

        .query-select {
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 150px;
        }

        .db-query-input-group {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .db-question-textarea {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            max-height: 200px;
            line-height: 1.6;
            transition: border-color 0.3s;
        }

        .db-question-textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        #dbQueryButton {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            min-width: 100px;
        }

        #dbQueryButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #dbQueryButton:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            padding: 20px 30px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            background: #ffffff;
        }

        .sql-display {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
        }

        .sql-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }

        .sql-code {
            color: #212529;
            line-height: 1.6;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
            position: sticky;
            top: 0;
        }

        .data-table tr:hover {
            background: #f1f3f5;
        }

        .chart-container {
            width: 100%;
            height: 400px;
            margin-top: 15px;
        }

        .error-box {
            background: #ffe3e3;
            color: #c92a2a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-button {
            padding: 8px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-button:hover:not(.active) {
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 智能助手</h1>
            <p>支持本地 Ollama、云端大模型和智能数据库查询</p>
        </div>

        <!-- 聊天模式配置 -->
        <div class="config-panel">
            <div class="tab-buttons">
                <button class="tab-button active" onclick="switchMode('chat')">💬 聊天模式</button>
                <button class="tab-button" onclick="switchMode('database')">🗄️ 数据库查询</button>
            </div>
        </div>

        <!-- 聊天模式界面 -->
        <div id="chatMode">
            <div class="config-panel">
                <div class="config-row">
                    <span class="config-label">服务模式:</span>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="serviceMode" value="local" checked>
                            <span>本地 (Ollama)</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="serviceMode" value="remote">
                            <span>远程 (阿里百炼)</span>
                        </label>
                    </div>
                </div>
                <div class="config-row">
                    <span class="config-label">选择模型:</span>
                    <select id="modelSelect">
                        <option value="">请选择模型...</option>
                    </select>
                </div>
                <div class="model-hint" id="modelHint"></div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="message assistant-message">
                    👋 你好！我是 AI 助手，请选择服务模式并选择模型，然后开始对话吧！
                </div>
            </div>

            <div class="input-area">
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="输入你的问题..." disabled>
                    <button id="sendButton" disabled>发送</button>
                </div>
            </div>
        </div>

        <!-- 数据库查询模式界面 -->
        <div id="databaseMode" style="display: none;">
            <div class="db-query-section">
                <div class="db-query-title">🗄️ 自然语言数据库查询</div>
                
                <!-- 服务模式和模型选择 -->
                <div class="query-options" style="margin-bottom: 15px;">
                    <div class="query-option-group">
                        <span class="query-option-label">服务模式:</span>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="dbServiceMode" value="local">
                                <span>本地 (Ollama)</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="dbServiceMode" value="remote" checked>
                                <span>远程 (阿里百炼)</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 模型选择和展示方式 -->
                <div class="query-options" style="margin-bottom: 15px;">
                    <div class="query-option-group">
                        <span class="query-option-label">AI 模型:</span>
                        <select id="dbModelSelect" class="query-select">
                            <option value="">请选择模型...</option>
                        </select>
                    </div>
                    <div class="query-option-group">
                        <span class="query-option-label">展示方式:</span>
                        <select id="displayType" class="query-select">
                            <option value="table">表格</option>
                            <option value="chart">图表</option>
                        </select>
                    </div>
                    <div class="query-option-group" id="chartTypeGroup" style="display: none;">
                        <span class="query-option-label">图表类型:</span>
                        <select id="chartType" class="query-select">
                            <option value="bar">柱状图</option>
                            <option value="line">折线图</option>
                            <option value="pie">饼图</option>
                            <option value="scatter">散点图</option>
                        </select>
                    </div>
                </div>
                
                <!-- 查询输入区域 -->
                <div class="db-query-input-group">
                    <textarea 
                        id="dbQuestionInput" 
                        class="db-question-textarea"
                        placeholder="请输入您的数据库查询问题，例如：&#10;- 查询所有用户的姓名和邮箱&#10;- 统计每个部门的员工数量&#10;- 显示最近一个月的销售趋势"
                    ></textarea>
                    <button id="dbQueryButton">查询</button>
                </div>
            </div>

            <div class="result-container" id="resultContainer">
                <div class="message assistant-message">
                    💡 请输入您的数据库查询问题，AI 将自动生成 SQL 并执行查询。
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chartInstance = null;
        
        const modelSelect = document.getElementById('modelSelect');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const chatArea = document.getElementById('chatArea');
        const modelHint = document.getElementById('modelHint');
        
        // 数据库查询相关元素
        const dbModelSelect = document.getElementById('dbModelSelect');
        const displayType = document.getElementById('displayType');
        const chartTypeGroup = document.getElementById('chartTypeGroup');
        const dbQuestionInput = document.getElementById('dbQuestionInput');
        const dbQueryButton = document.getElementById('dbQueryButton');
        const resultContainer = document.getElementById('resultContainer');

        // 本地 Ollama 模型列表（初始为空，从接口获取）
        const localModels = [];
        // 远程阿里百炼模型列表
        const remoteModels = [
            'deepseek-v4-flash',
            'deepseek-v4-pro',
            'qwen3.7-max-preview',
            'qwen3.7-max-2026-05-20',
            'qwen3.7-max-2026-05-17',
            'qwen3.6-plus',
            'qwen3.6-flash',
            'qwen3.6-35b-a3b',
            'qwen3.6-27b',
            'qwen3.6-max-preview',
            'qwen3.6-flash-2026-04-16',
            'qwen3.5-plus-2026-04-20',
            'qwen3.6-plus-2026-04-02',
            'qwen-flash-character-2026-02-26',
            'kimi-k2.6',
            'glm-5.1',
            'gui-plus-2026-02-26'
        ];
        // 初始化
        async function init() {
            // 监听服务模式切换
            document.querySelectorAll('input[name="serviceMode"]').forEach(radio => {
                radio.addEventListener('change', async (e) => {
                    if (e.target.value === 'local') {
                        await loadLocalModels();
                    } else {
                        loadRemoteModels();
                    }
                });
            });

            // 加载本地模型
            await loadLocalModels();

            // 绑定发送按钮
            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // 数据库查询相关事件
            displayType.addEventListener('change', () => {
                if (displayType.value === 'chart') {
                    chartTypeGroup.style.display = 'flex';
                } else {
                    chartTypeGroup.style.display = 'none';
                }
            });
            
            dbQueryButton.addEventListener('click', executeDatabaseQuery);
            dbQuestionInput.addEventListener('keydown', (e) => {
                // Ctrl+Enter 或 Cmd+Enter 发送
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    executeDatabaseQuery();
                }
            });
            
            // 初始化数据库查询模型选择
            loadDatabaseModels();
        }

        // 加载本地 Ollama 模型（从接口动态获取）
        async function loadLocalModels() {
            try {
                modelSelect.innerHTML = '<option value="">加载中...</option>';
                
                const response = await fetch('/api/chat/ollama/models');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const models = await response.json();
                
                if (models.length === 0) {
                    modelSelect.innerHTML = '<option value="">没有可用的模型</option>';
                    modelHint.textContent = '⚠️ 请确保 Ollama 服务已启动并有对应模型';
                    modelHint.style.color = '#dc3545';
                    messageInput.disabled = true;
                    sendButton.disabled = true;
                    return;
                }
                
                // 更新本地模型列表
                localModels.length = 0;
                localModels.push(...models);
                
                modelSelect.innerHTML = '<option value="">请选择模型...</option>';
                models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model;
                    modelSelect.appendChild(option);
                });
                
                modelHint.textContent = `✅ 已加载 ${models.length} 个本地模型`;
                modelHint.style.color = '#28a745';
                messageInput.disabled = false;
                sendButton.disabled = false;
                
            } catch (error) {
                console.error('加载本地模型失败:', error);
                modelSelect.innerHTML = '<option value="">加载失败</option>';
                modelHint.textContent = '❌ 无法连接到 Ollama 服务，请检查配置';
                modelHint.style.color = '#dc3545';
                messageInput.disabled = true;
                sendButton.disabled = true;
            }
        }

        // 加载远程阿里百炼模型
        function loadRemoteModels() {
            modelSelect.innerHTML = '<option value="">请选择模型...</option>';
            remoteModels.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                modelSelect.appendChild(option);
            });
            modelHint.textContent = ' 远程模式：使用阿里百炼 API，已配置 API Key';
            // 启用输入框和发送按钮
            messageInput.disabled = false;
            sendButton.disabled = false;
        }
        
        // 加载数据库查询模型
        function loadDatabaseModels() {
            // 监听数据库查询服务模式切换
            document.querySelectorAll('input[name="dbServiceMode"]').forEach(radio => {
                radio.addEventListener('change', async (e) => {
                    if (e.target.value === 'local') {
                        await loadLocalDatabaseModels();
                    } else {
                        loadRemoteDatabaseModels();
                    }
                });
            });
            
            // 默认加载远程模型
            loadRemoteDatabaseModels();
        }
        
        // 加载本地 Ollama 模型（数据库查询用，从接口动态获取）
        async function loadLocalDatabaseModels() {
            dbModelSelect.innerHTML = '<option value="">加载中...</option>';
            
            try {
                const response = await fetch('/api/chat/ollama/models');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const models = await response.json();
                
                dbModelSelect.innerHTML = '<option value="">请选择模型...</option>';
                models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model;
                    dbModelSelect.appendChild(option);
                });
            } catch (error) {
                console.error('加载本地数据库模型失败:', error);
                dbModelSelect.innerHTML = '<option value="">加载失败</option>';
            }
        }
        
        // 加载远程阿里百炼模型（数据库查询用）
        function loadRemoteDatabaseModels() {
            dbModelSelect.innerHTML = '<option value="">请选择模型...</option>';

            const remoteModels = [
                'deepseek-v4-flash',
                'deepseek-v4-pro',
                'qwen3.7-max-preview',
                'qwen3.7-max-2026-05-20',
                'qwen3.7-max-2026-05-17',
                'qwen3.6-plus',
                'qwen3.6-flash',
                'qwen3.6-35b-a3b',
                'qwen3.6-27b',
                'qwen3.6-max-preview',
                'qwen3.6-flash-2026-04-16',
                'qwen3.5-plus-2026-04-20',
                'qwen3.6-plus-2026-04-02',
                'qwen-flash-character-2026-02-26',
                'kimi-k2.6',
                'glm-5.1',
                'gui-plus-2026-02-26'
            ];
            
            remoteModels.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                dbModelSelect.appendChild(option);
            });
            
            // 默认选择 qwen-plus
            dbModelSelect.value = 'qwen-plus';
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            const selectedModel = modelSelect.value;

            if (!message) {
                alert('请输入消息');
                return;
            }

            if (!selectedModel) {
                alert('请先选择模型');
                return;
            }

            // 显示用户消息
            appendMessage('user', message);
            messageInput.value = '';

            // 禁用输入
            messageInput.disabled = true;
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading"></span> 思考中...';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        model: selectedModel
                    })
                });

                // 即使返回 500，也要读取错误信息
                const data = await response.json();
                
                if (!response.ok) {
                    // 后端返回的错误信息
                    appendMessage('error', data.content || `请求失败: HTTP ${response.status}`);
                } else {
                    appendMessage('assistant', data.content);
                }
            } catch (error) {
                console.error('Error:', error);
                let errorMessage = '抱歉，发生了错误';
                
                if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    errorMessage = '网络错误，请检查连接';
                } else {
                    errorMessage += '：' + error.message;
                }
                
                appendMessage('error', errorMessage);
            } finally {
                messageInput.disabled = false;
                sendButton.disabled = false;
                sendButton.textContent = '发送';
                messageInput.focus();
            }
        }

        // 添加消息到聊天区域
        function appendMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            messageDiv.textContent = content;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        // 切换模式
        function switchMode(mode) {
            const chatMode = document.getElementById('chatMode');
            const databaseMode = document.getElementById('databaseMode');
            const buttons = document.querySelectorAll('.tab-button');
            
            if (mode === 'chat') {
                chatMode.style.display = 'block';
                databaseMode.style.display = 'none';
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
            } else {
                chatMode.style.display = 'none';
                databaseMode.style.display = 'block';
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
            }
        }
        
        // 执行数据库查询
        async function executeDatabaseQuery() {
            const question = dbQuestionInput.value.trim();
            const selectedModel = dbModelSelect.value;
            
            if (!question) {
                alert('请输入查询问题');
                return;
            }
            
            if (!selectedModel) {
                alert('请先选择 AI 模型');
                return;
            }
            
            // 显示加载状态
            resultContainer.innerHTML = '<div class="message assistant-message"> AI 正在生成 SQL...（这可能需要 10-30 秒，请耐心等待）</div>';
            dbQueryButton.disabled = true;
            dbQueryButton.textContent = '查询中...';
            
            // 创建 AbortController 用于超时控制
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 600000); // 10分钟超时（本地 Ollama 模型）
            
            try {
                const response = await fetch('/api/database/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question,
                        model: selectedModel,
                        displayType: displayType.value,
                        chartType: document.getElementById('chartType').value
                    }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                displayQueryResult(data);
                
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('Error:', error);
                
                let errorMessage = error.message;
                if (error.name === 'AbortError') {
                    errorMessage = '请求超时，请重试（AI 处理可能需要较长时间）';
                }
                
                resultContainer.innerHTML = `
                    <div class="error-box">
                        <strong> 查询失败：</strong><br>
                        ${errorMessage}
                    </div>
                `;
            } finally {
                dbQueryButton.disabled = false;
                dbQueryButton.textContent = '查询';
            }
        }
        
        // 显示查询结果
        function displayQueryResult(data) {
            let html = '';
            
            if (!data.success) {
                html = `
                    <div class="error-box">
                        <strong>❌ 查询失败：</strong><br>
                        ${data.error}
                    </div>
                `;
            } else {
                // 显示生成的 SQL
                html += `
                    <div class="sql-display">
                        <div class="sql-label">📝 生成的 SQL:</div>
                        <div class="sql-code">${escapeHtml(data.sql)}</div>
                    </div>
                `;
                
                // 根据前端选择的展示类型显示结果（不是后端返回的）
                const currentDisplayType = displayType.value;
                
                if (currentDisplayType === 'chart' && data.echartsOption) {
                    // 显示图表
                    html += '<div id="chartContainer" class="chart-container"></div>';
                    resultContainer.innerHTML = html;
                    
                    // 渲染 ECharts 图表
                    setTimeout(() => {
                        renderChart(data.echartsOption);
                    }, 100);
                } else {
                    // 显示表格
                    html += `<p style="color: #6c757d; margin-bottom: 10px;">共 ${data.totalRows} 条记录</p>`;
                    html += generateTable(data.columns, data.rows);
                    resultContainer.innerHTML = html;
                }
            }
        }
        
        // 生成 HTML 表格
        function generateTable(columns, rows) {
            if (!rows || rows.length === 0) {
                return '<p style="color: #6c757d;">没有数据</p>';
            }
            
            let html = '<table class="data-table"><thead><tr>';
            columns.forEach(col => {
                html += `<th>${escapeHtml(col)}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            rows.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    const value = row[col];
                    html += `<td>${escapeHtml(value !== null && value !== undefined ? String(value) : '')}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            return html;
        }
        
        // 渲染 ECharts 图表
        function renderChart(option) {
            const chartDom = document.getElementById('chartContainer');
            if (!chartDom) return;
            
            // 销毁之前的实例
            if (chartInstance) {
                chartInstance.dispose();
            }
            
            // 创建新实例
            chartInstance = echarts.init(chartDom);
            chartInstance.setOption(option);
            
            // 响应式调整
            window.addEventListener('resize', () => {
                chartInstance.resize();
            });
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 启动
        init();
    </script>
</body>
</html>
