version: '3.8'

services:
  # Spring AI Application
  app:
    image: eclipse-temurin:21-jre-alpine
    container_name: my-spring-ai
    ports:
      - "8000:8000"
    volumes:
      - ./target/my-spring-ai-1.0.jar:/app/app.jar:ro
    working_dir: /app
    command: ["java", "-jar", "app.jar"]
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://144.24.12.178:35432/iot_platform?currentSchema=public}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-pg112233}
      SPRING_AI_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-sk-cbc5df1475b642b98d007c98dbf95855}
      SPRING_AI_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://144.24.12.178:11434}
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

networks:
  ai-network:
    driver: bridge
