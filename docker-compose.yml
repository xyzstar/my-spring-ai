version: '3.8'

services:
  # Spring AI Application
  app:
    build: .
    container_name: my-spring-ai-app
    ports:
      - "8000:8000"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://192.168.1.130:5432/my_ai?currentSchema=public}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-iot.2024}
      SPRING_AI_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-sk-xxxxxxxxxxxxxxxxxxx}
      SPRING_AI_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

networks:
  ai-network:
    driver: bridge
